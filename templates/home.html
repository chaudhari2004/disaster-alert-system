<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Disaster Alert System</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f4f4f4, #e6e6e6);
        }

        .container{
            width: 450px;
            margin: 120px auto;
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1{
            color: darkred;
            margin-bottom: 40px;
        }

        .btn{
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: darkred;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover{
            background-color: red;
        }

        .footer{
            margin-top: 30px;
            color: gray;
            font-size: 14px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            Cloud-Based Disaster Alert System
        </h1>

        <a href="/login" class="btn">
            Admin Panel
        </a>

        <a href="/sos" class="btn">
            Citizen Emergency SOS
        </a>

        <div class="footer">

            Emergency Response & Rescue Management System

        </div>

    </div>

</body>

</html>
